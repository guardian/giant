name: infra-build

on:
  workflow_dispatch:
  push:
    paths:
      - "../../infra/**"
      - ".github/workflows/infra*"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./infra/cdk

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version-file: './infra/cdk/.nvmrc'
          cache: npm
          cache-dependency-path: ./infra/cdk/package-lock.json

      - name: cdk synth
        run: |
          npm ci
          npm run lint
          npm run test
          npm run format -- --check
          npm run synth

      - uses: guardian/actions-riff-raff@v4
        with:
          buildNumberOffset: 107
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          app: postgres
          contentDirectories: |
            cloudformation:
              - ./infra/cdk/cdk.out/pfi-giant-postgres-CODE.template.json
              - ./infra/cdk/cdk.out/pfi-giant-postgres-PROD.template.json
          config: |
            stacks:
              - pfi-giant
            regions:
              - eu-west-1
            allowedStages:
              - CODE
              - PROD
            deployments:
              cloudformation:
                type: cloud-formation
                app: postgres
                parameters:
                  templateStagePaths:
                    CODE: pfi-giant-postgres-CODE.template.json
                    PROD: pfi-giant-postgres-PROD.template.json
