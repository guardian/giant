name: infra-build

on:
  workflow_dispatch:
  push:
    paths:
      - "../../infra/**"
      - ".github/workflows/infra*"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ./infra/cdk

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version-file: './infra/cdk/.nvmrc'
          cache: npm
          cache-dependency-path: ./infra/cdk/package-lock.json

      - name: cdk synth
        run: |
          npm ci
          npm run lint
          npm run test
          npm run format:check
          npm run synth

      - uses: guardian/actions-riff-raff@v4
        with:
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          projectName: pfi-giant::postgres
          configPath: infra/cdk/cdk.out/postgres/riff-raff.yaml
          contentDirectories: |
            cdk.out/postgres:
              - infra/cdk/cdk.out/postgres/pfi-giant-postgres-CODE.template.json
              - infra/cdk/cdk.out/postgres/pfi-giant-postgres-PROD.template.json

      - uses: guardian/actions-riff-raff@v4
        with:
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          projectName: pfi-giant::neo4j
          configPath: infra/cdk/cdk.out/neo4j/riff-raff.yaml
          contentDirectories: |
            cdk.out/neo4j:
              - infra/cdk/cdk.out/neo4j/pfi-giant-neo4j-CODE.template.json
              - infra/cdk/cdk.out/neo4j/pfi-giant-neo4j-PROD.template.json
