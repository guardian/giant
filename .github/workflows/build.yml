# Find full documentation here https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions
name: CI

on:
  # Manual invocation.
  workflow_dispatch:

  push:

jobs:
  CI:
    runs-on: 4core-ubuntu-latest-arm-giant

    # See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
    permissions:
      # required by aws-actions/configure-aws-credentials
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Setup AWS credentials to enable uploading to S3 for Riff-Raff.
      # See https://github.com/aws-actions/configure-aws-credentials

      ############################################################
      ## THIS SECTION IS TO BE REMOVED WHEN RIFF RAFF ACTION WORKS
      ############################################################
      - uses: aws-actions/configure-aws-credentials@v4
        name: setup-riffraff-credentials
        with:
          role-to-assume: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          aws-region: eu-west-1

      # TODO: configure caching
      # See https://github.com/actions/setup-java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version-file: '.java-version'
          distribution: corretto
          cache: sbt

      - name: Install sbt
        run: |
          sudo apt-get update
          sudo apt-get install apt-transport-https curl gnupg -yqq
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee /etc/apt/sources.list.d/sbt_old.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo -H gpg --no-default-keyring --keyring gnupg-ring:/etc/apt/trusted.gpg.d/scalasbt-release.gpg --import
          sudo chmod 644 /etc/apt/trusted.gpg.d/scalasbt-release.gpg
          sudo apt-get update
          sudo apt-get install sbt

      # TODO: configure caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run script/ci-1-playground.sh to build for playground
        run: |
          LAST_TEAMCITY_BUILD=5000
          export GITHUB_RUN_NUMBER=$(( $GITHUB_RUN_NUMBER + $LAST_TEAMCITY_BUILD ))
          ./scripts/ci-1-playground.sh

      - uses: guardian/actions-riff-raff@v4
        with:
          #     riffRaffManifestProjectName := s"investigations::${sys.props.getOrElse("PFI_STACK", "pfi-playground")}",
          projectName: investigations::pfi-playground
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          buildNumberOffset: 5000
          #    riffRaffUploadArtifactBucket := Some("riffraff-artifact"),
          #    riffRaffUploadManifestBucket := Some("riffraff-builds"),
          contentDirectories: ./target
          #    riffRaffArtifactResources := Seq(
          #      (backend / Debian / packageBin).value -> s"${(backend / name).value}/${(backend / name).value}.deb",
          #      (cli / Debian / packageBin).value -> s"${(cli / name).value}/${(cli / name).value}.deb",
          #      (cli / Universal / packageZipTarball).value -> s"pfi-public-downloads/${(cli / name).value}.tar.gz",
          configPath: riff-raff.yaml # location of riff-raff.yaml
          #      file("riff-raff.yaml") -> "riff-raff.yaml"
          #    )

      - name: Run script/ci-2-giant.sh to build for giant
        run: |
          LAST_TEAMCITY_BUILD=5000
          export GITHUB_RUN_NUMBER=$(( $GITHUB_RUN_NUMBER + $LAST_TEAMCITY_BUILD ))
          ./scripts/ci-2-giant.sh

      - name: Run script/ci-3-clean.sh to reset checkout just in case
        run: |
          ./scripts/ci-3-clean.sh
